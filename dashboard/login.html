<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdant Plant — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#1a7a4a;--green-light:#2ecc71;--green-pale:#e8f5ee;
    --dark:#0a1208;--dark2:#111d15;--dark3:#1a2d1e;
    --gray:#6b7d72;--white:#ffffff;--border:#d4e2d9;
    --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}

  /* bg plant silhouettes */
  .bg-plants{position:absolute;inset:0;pointer-events:none;opacity:0.06;}
  .bg-plants svg{width:100%;height:100%;}

  .login-card{
    background:var(--dark2);border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:2.5rem;width:100%;max-width:400px;
    position:relative;z-index:1;
  }
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;justify-content:center;}
  .logo-mark{width:40px;height:40px;background:var(--dark3);border-radius:10px;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;}
  .logo-name{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--white);}
  h1{font-family:var(--font-head);font-size:1.5rem;font-weight:800;color:var(--white);text-align:center;margin-bottom:0.25rem;}
  .subtitle{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:2rem;}

  .form-group{margin-bottom:1rem;}
  label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;}
  input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--white);font-family:var(--font-body);transition:border-color 0.2s;outline:none;}
  input:focus{border-color:var(--green-light);}
  input::placeholder{color:rgba(255,255,255,0.2);}

  .btn-login{width:100%;background:var(--green-light);color:var(--dark);border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all 0.2s;margin-top:0.5rem;}
  .btn-login:hover{background:#27d96b;transform:translateY(-1px);}
  .btn-login:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .error-msg{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fc8181;margin-bottom:1rem;display:none;}
  .error-msg.show{display:block;}

  .back-link{text-align:center;margin-top:1.5rem;}
  .back-link a{font-size:13px;color:rgba(255,255,255,0.3);text-decoration:none;transition:color 0.2s;}
  .back-link a:hover{color:var(--green-light);}

  .api-config{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.07);}
  .api-config label{color:rgba(255,255,255,0.3);}
  .api-config input{font-family:monospace;font-size:12px;}
  .config-hint{font-size:11px;color:rgba(255,255,255,0.2);margin-top:4px;}
</style>
</head>
<body>

<div class="bg-plants">
  <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <line x1="100" y1="900" x2="100" y2="300" stroke="#2ecc71" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="68" cy="420" rx="55" ry="28" fill="#2ecc71" transform="rotate(-25 68 420)"/>
    <ellipse cx="130" cy="370" rx="48" ry="24" fill="#2ecc71" transform="rotate(20 130 370)"/>
    <ellipse cx="80" cy="320" rx="42" ry="22" fill="#2ecc71" transform="rotate(-15 80 320)"/>
    <line x1="1340" y1="900" x2="1340" y2="280" stroke="#2ecc71" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="1308" cy="380" rx="55" ry="28" fill="#2ecc71" transform="rotate(25 1308 380)"/>
    <ellipse cx="1370" cy="330" rx="48" ry="24" fill="#2ecc71" transform="rotate(-20 1370 330)"/>
    <ellipse cx="1320" cy="290" rx="42" ry="22" fill="#2ecc71" transform="rotate(15 1320 290)"/>
  </svg>
</div>

<div class="login-card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
        <line x1="14" y1="24" x2="7" y2="8" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
        <line x1="14" y1="24" x2="21" y2="8" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="9" cy="14" rx="7" ry="4" fill="#2ecc71" transform="rotate(-40 9 14)"/>
        <ellipse cx="19" cy="14" rx="7" ry="4" fill="#2ecc71" transform="rotate(40 19 14)"/>
        <ellipse cx="7" cy="8" rx="5" ry="3" fill="#27ae60" transform="rotate(-30 7 8)"/>
        <ellipse cx="21" cy="8" rx="5" ry="3" fill="#27ae60" transform="rotate(30 21 8)"/>
      </svg>
    </div>
    <span class="logo-name">Verdant</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your plant dashboard</p>

  <div class="error-msg" id="errorMsg">Invalid email or password.</div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn-login" id="loginBtn" onclick="login()">Sign In →</button>

  <div class="api-config">
    <div class="form-group">
      <label>Supabase URL</label>
      <input type="text" id="supabaseUrl" placeholder="https://xxxxx.supabase.co" autocomplete="off"/>
      <div class="config-hint">Saved locally in your browser</div>
    </div>
    <div class="form-group">
      <label>Supabase Anon Key</label>
      <input type="text" id="supabaseKey" placeholder="eyJhbGc..." autocomplete="off"/>
    </div>
  </div>

  <div class="back-link"><a href="index.html">← Back to website</a></div>
</div>

<script>
  const SUPABASE_URL_KEY = 'vp_supabase_url';
  const SUPABASE_KEY_KEY = 'vp_supabase_key';

  // Load saved config
  document.getElementById('supabaseUrl').value = localStorage.getItem(SUPABASE_URL_KEY) || '';
  document.getElementById('supabaseKey').value = localStorage.getItem(SUPABASE_KEY_KEY) || '';

  // Check if already logged in
  if (localStorage.getItem('vp_session')) {
    window.location.href = 'app.html';
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
    const supabaseKey = document.getElementById('supabaseKey').value.trim();
    const btn = document.getElementById('loginBtn');
    const errMsg = document.getElementById('errorMsg');

    if (!email || !password) { showError('Please enter email and password.'); return; }
    if (!supabaseUrl || !supabaseKey) { showError('Please enter your Supabase URL and Key.'); return; }

    // Save config
    localStorage.setItem(SUPABASE_URL_KEY, supabaseUrl);
    localStorage.setItem(SUPABASE_KEY_KEY, supabaseKey);

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errMsg.classList.remove('show');

    try {
      const res = await fetch(`${supabaseUrl}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': supabaseKey },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.access_token) {
        localStorage.setItem('vp_session', JSON.stringify({
          token: data.access_token,
          user: data.user,
          expires: Date.now() + (data.expires_in * 1000)
        }));
        window.location.href = 'app.html';
      } else {
        showError(data.error_description || 'Invalid email or password.');
      }
    } catch(e) {
      showError('Connection error. Check your Supabase URL.');
    }

    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
